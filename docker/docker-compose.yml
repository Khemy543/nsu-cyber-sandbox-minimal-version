services:
  storage:
    image: minio/minio
    container_name: storage
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - storage_data:/data

volumes:
  storage_data: